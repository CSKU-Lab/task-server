name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    uses: CSKU-Lab/.github/.github/workflows/docker-publish.yml@main
    with:
      image_name: task-server
      dockerfile_path: Dockerfile.prod
      gitops_paths: apps/task-server/env.libsonnet
      service_name: task-server
    secrets: inherit
